# ResolveTrace OSS - Docker Compose quickstart
#
# Goal: `docker compose up` on a clean machine yields a working ResolveTrace
# instance with:
#   - ingest API on http://localhost:4317   (SDK and replay traffic)
#   - portal UI on http://localhost:3000    (operator dashboard)
# Single-tenant mode is the default; no multi-tenant routing or external
# identity provider required. The `ingest` and `portal` services share the
# same image (built once, launched with different commands).

version: "3.9"

services:
  # ResolveTrace ingest server.
  # Built from this repo root; the TS build output is copied into the image.
  resolvetrace:
    image: resolvetrace-core:dev
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["node", "dist/ingest-api/main.js"]
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      # --- Listener ---
      PORT: "4317"
      HOST: "0.0.0.0"
      LOG_LEVEL: "info"
      # CORS_ORIGINS: comma-separated list, default `*`. Set explicitly when
      # serving a known portal origin in production.
      CORS_ORIGINS: ""

      # --- Tenancy ---
      RESOLVETRACE_TENANT_MODE: "single"
      RESOLVETRACE_TENANT_ID: "oss-single-tenant"
      RESOLVETRACE_ENV: "dev"
      INGEST_HOST: "resolvetrace.local"

      # --- Data plane ---
      DATABASE_URL: "postgres://resolvetrace:resolvetrace@postgres:5432/resolvetrace"
      REDIS_URL: "redis://redis:6379/0"

      # --- Object storage (MinIO, S3-compatible) ---
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "resolvetrace-replay"
      S3_PREFIX: ""
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"

      # --- Auth (portal users only — separate from the ingest API key below) ---
      AUTH_MODE: "local"
      OSS_ADMIN_USERNAME: "admin"
      # OSS_ADMIN_PASSWORD_HASH is a bcrypt hash; generate with `bcrypt` CLI.
      OSS_ADMIN_PASSWORD_HASH: "$$2b$$10$$REPLACE_ME_WITH_REAL_BCRYPT_HASH"

      # --- Secrets ---
      SECRETS_MODE: "env"

      # --- Ingest API key ---
      # OSS runs with a single opaque API key (Bearer token) for the ingest
      # surface. Rotate by redeploying with a new value.
      OSS_API_KEY: "replace-me-with-long-random-string"
    ports:
      # 4317: HTTP ingest port (events / replay / session).
      - "4317:4317"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4317/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Portal web app — Next.js 16 App Router served via the standalone Node
  # bundle emitted at build time (see deploy/Dockerfile). Shares the same
  # image as the ingest service; only the `command:` differs.
  portal:
    image: resolvetrace-core:dev
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["node", "web/server.js"]
    working_dir: /app
    environment:
      # Next.js standalone server reads these to bind the listener.
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: "production"

      # --- Ingest API wiring ---
      # Server components on /sessions and /sessions/[id] call the ingest
      # service's portal query endpoints. RT_PORTAL_API_TOKEN must match
      # the token the ingest service is configured to accept (see the
      # resolvetrace service environment).
      RT_INGEST_URL: "http://resolvetrace:4317"
      RT_PORTAL_API_TOKEN: "replace-me-with-portal-token"
    ports:
      # 3000: portal UI.
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Application data store. Single DB in OSS; no `tenants` table, no
  # per-tenant schema. Schema migrations ship in the server image (later wave).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "resolvetrace"
      POSTGRES_PASSWORD: "resolvetrace"
      POSTGRES_DB: "resolvetrace"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Dedup cache and rate-limit buckets (when REDIS_URL is set; otherwise the
  # server falls back to in-memory).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # S3-compatible object storage for replay chunks. MinIO is the standard
  # OSS substitute for S3; ResolveTrace's storage adapter speaks the same
  # S3 API against either.
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    ports:
      # 9000: S3 API. 9001: MinIO admin console.
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
