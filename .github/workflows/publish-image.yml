# Builds and publishes the OSS `resolvetrace-core` Docker image to GHCR.
#
# Triggers:
#   - push to `main`          → `:latest` + `:sha-<shortsha>` tags
#   - push of a `v*.*.*` tag  → `:vX.Y.Z`, `:X.Y`, `:X`, `:latest`
#   - manual dispatch         → `:manual-<shortsha>` (for smoke tests)
#
# Permissions model:
#   GHCR accepts the ambient `GITHUB_TOKEN` when the workflow grants
#   `packages: write`. No PAT or extra secret is required. When the
#   first push lands, the resulting package appears under the repo's
#   GitHub account — visibility defaults to "inherit from repo" which
#   means public for a public repo.
#
# See ADR-0006 (three-repo-split CI supply-chain hygiene) for the
# action-pinning policy: every `uses:` line below points at a pinned
# major version; dependabot.yml will file PRs to update them.
name: publish-image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

# GHCR requires `packages: write`. `id-token: write` is reserved for a
# future Sigstore / cosign signing step (not wired today).
permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: publish-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: peaktek/resolvetrace-core

jobs:
  build-and-publish:
    name: build + publish multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag rules:
          #   - `type=ref,event=branch`   → `main` on main-branch pushes
          #   - `type=sha,prefix=sha-`    → `sha-<shortsha>` on every build
          #   - `type=semver,pattern=...` → semver tags on tag pushes
          #   - `type=raw,value=latest,enable={{is_default_branch}}`
          #                               → `latest` only on default branch
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=resolvetrace-core
            org.opencontainers.image.description=ResolveTrace OSS ingest server (single-tenant, BSL 1.1).
            org.opencontainers.image.vendor=PeakTek
            org.opencontainers.image.licenses=BUSL-1.1

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inject build-time metadata used by the Dockerfile's LABEL block.
          # The `labels` emitted by metadata-action already set the OCI
          # annotations on the manifest list; these build-args just make
          # sure the same values appear on the image config layer too.
          build-args: |
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
            IMAGE_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        run: |
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Registry: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
