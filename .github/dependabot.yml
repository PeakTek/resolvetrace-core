# Dependabot config for resolvetrace-core.
#
# Covers:
#   - npm toolchain (fastify, AWS SDK pieces, vitest, typescript, etc.)
#   - GitHub Actions pinned in `.github/workflows/`
#   - Docker base images referenced by `deploy/Dockerfile`
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: docker
    directory: "/deploy"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(docker)"
